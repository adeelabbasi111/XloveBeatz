{% extends 'base.html' %}

{% block title %}Reset Password - XLoveBeats{% endblock %}

{% block content %}
<section class="reset-page">
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-header">
                <div class="reset-icon"><i class="fas fa-lock"></i></div>
                <h2>Reset Password</h2>
                <p>Enter your new password below</p>
            </div>

            <div class="auth-error" id="resetError"></div>
            <div class="auth-success" id="resetSuccess"></div>

            <form id="resetForm" class="auth-form" onsubmit="return false;">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" name="new_password"
                           required placeholder="Min 6 characters" minlength="6"
                           autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirm_password"
                           required placeholder="Re-enter password"
                           autocomplete="new-password">
                </div>

                <button type="submit" class="auth-submit-btn magnetic-btn" id="resetSubmitBtn">
                    <span class="btn-text"><i class="fas fa-key"></i> Reset Password</span>
                    <span class="btn-loader" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
                </button>
            </form>

            <div class="auth-switch" style="margin-top: 1rem;">
                <a href="/" id="backToHome"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>
</section>

<script>
(function() {
    'use strict';

    var form = document.getElementById('resetForm');
    var errorEl = document.getElementById('resetError');
    var successEl = document.getElementById('resetSuccess');
    var submitBtn = document.getElementById('resetSubmitBtn');

    form.addEventListener('submit', async function(e) {
        e.preventDefault();

        var token = form.querySelector('input[name="token"]').value;
        var newPass = document.getElementById('newPassword').value;
        var confirmPass = document.getElementById('confirmPassword').value;

        errorEl.style.display = 'none';
        errorEl.textContent = '';
        successEl.style.display = 'none';
        successEl.textContent = '';

        if (newPass.length < 6) {
            errorEl.textContent = 'Password must be at least 6 characters';
            errorEl.style.display = 'block';
            return;
        }

        if (newPass !== confirmPass) {
            errorEl.textContent = 'Passwords do not match';
            errorEl.style.display = 'block';
            return;
        }

        submitBtn.disabled = true;
        var btnText = submitBtn.querySelector('.btn-text');
        var btnLoader = submitBtn.querySelector('.btn-loader');
        if (btnText) btnText.style.display = 'none';
        if (btnLoader) btnLoader.style.display = 'inline';

        try {
            var res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token, new_password: newPass })
            });
            var result = await res.json();

            if (result.success) {
                successEl.textContent = result.message;
                successEl.style.display = 'block';
                form.style.display = 'none';
                setTimeout(function() { window.location.href = '/'; }, 2000);
            } else {
                errorEl.textContent = result.error || 'Reset failed';
                errorEl.style.display = 'block';
            }
        } catch (err) {
            errorEl.textContent = 'Network error. Please try again.';
            errorEl.style.display = 'block';
        } finally {
            submitBtn.disabled = false;
            if (btnText) btnText.style.display = 'inline';
            if (btnLoader) btnLoader.style.display = 'none';
        }
    });
})();
</script>
{% endblock %}
